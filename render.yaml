# ── Render Blueprint ────────────────────────────────────────────────
# Deploy with: one-click from GitHub via Render Dashboard
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: repo-copilot
    runtime: python
    plan: free
    buildCommand: pip install fastapi uvicorn[standard] psycopg2-binary pydantic httpx python-dotenv anthropic openai google-genai pygithub GitPython chromadb sentence-transformers
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repo-copilot-db
          property: connectionString
      - key: TRACE_EMITTER
        value: json
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: openrouter/free
      - key: EMBEDDING_PROVIDER
        value: google
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WATCHED_REPO
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: repo-copilot-db
    databaseName: repocopilot
    user: repocopilot
    plan: free
