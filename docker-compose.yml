version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: repocopilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma-data
    volumes:
      - chroma-data:/chroma-data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/repocopilot
      CHROMA_PERSIST_DIR: /data/chroma
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
      GITHUB_WEBHOOK_SECRET: ""
      GITHUB_TOKEN: ""
      GITHUB_WATCHED_REPO: owner/repo
      TRACE_EMITTER: json
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - ./data:/data
      - .:/app

  sandbox:
    build: ./scripts/sandbox
    cap_drop:
      - ALL
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  pgdata:
  chroma-data:
