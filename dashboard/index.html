<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repo Copilot Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #232738;
    --border: #2a2e3f;
    --text: #e1e5ee;
    --text-muted: #8b8fa5;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .header h1 span { color: var(--accent); }
  .header .badge {
    font-size: 0.7rem;
    background: var(--surface-2);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--accent); }
  .card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.4rem; }
  .card .value { font-size: 2rem; font-weight: 700; }
  .card .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
  .card .value.green { color: var(--green); }
  .card .value.yellow { color: var(--yellow); }
  .card .value.red { color: var(--red); }
  .card .value.accent { color: var(--accent); }
  .card .value.blue { color: var(--blue); }
  .card .value.purple { color: var(--purple); }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1.5rem;
  }
  .panel-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 { font-size: 0.95rem; font-weight: 600; }
  .panel-header .count {
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--surface-2);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 0.75rem 1.25rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  td {
    padding: 0.75rem 1.25rem;
    font-size: 0.875rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:hover td { background: var(--surface-2); }
  .label-tag {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
  }
  .label-tag.bug { background: rgba(239,68,68,0.15); color: var(--red); }
  .label-tag.feature { background: rgba(59,130,246,0.15); color: var(--blue); }
  .label-tag.duplicate { background: rgba(168,85,247,0.15); color: var(--purple); }
  .label-tag.unclear { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .label-tag.opened_pr { background: rgba(34,197,94,0.15); color: var(--green); }
  .label-tag.commented { background: rgba(99,102,241,0.15); color: var(--accent); }

  .chart-container { padding: 1.25rem; }
  .chart-container canvas { max-height: 280px; }

  .empty {
    text-align: center;
    padding: 3rem 1.25rem;
    color: var(--text-muted);
  }
  .empty p { font-size: 0.9rem; margin-bottom: 0.5rem; }
  .empty .hint { font-size: 0.8rem; }

  .tooltip {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: none;
  }
  .tooltip.visible { display: block; }

  a { color: var(--accent-hover); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    color: var(--text-muted);
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 0.75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; }

  .dist-bar { display: flex; align-items: center; gap: 0.5rem; margin: 0.3rem 0; }
  .dist-bar .dist-label { width: 80px; font-size: 0.8rem; color: var(--text-muted); }
  .dist-bar .dist-track { flex: 1; height: 8px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
  .dist-bar .dist-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .dist-bar .dist-count { width: 30px; text-align: right; font-size: 0.8rem; font-weight: 600; }

  @media (max-width: 768px) {
    .grid-2 { grid-template-columns: 1fr; }
    .container { padding: 1rem; }
    .header { padding: 0.75rem 1rem; }
    th, td { padding: 0.5rem 0.75rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>&#9670;</span> Repo Copilot</h1>
  <span class="badge" id="header-status">connecting...</span>
</div>

<div class="container">

  <!-- Stats Cards -->
  <div class="cards" id="stats-cards">
    <div class="card"><div class="label">Issues Processed</div><div class="value accent" id="stat-issues">—</div></div>
    <div class="card"><div class="label">Decisions Made</div><div class="value blue" id="stat-decisions">—</div></div>
    <div class="card"><div class="label">PRs Opened</div><div class="value green" id="stat-prs">—</div></div>
    <div class="card"><div class="label">Latest Eval Score</div><div class="value purple" id="stat-eval">—</div></div>
  </div>

  <div class="grid-2">
    <div>
      <!-- Recent Issues -->
      <div class="panel">
        <div class="panel-header">
          <h2>Recent Issues</h2>
          <span class="count" id="issues-count">0</span>
        </div>
        <div id="issues-table">
          <div class="loading"><div class="spinner"></div> Loading issues...</div>
        </div>
      </div>

      <!-- Eval History Chart -->
      <div class="panel">
        <div class="panel-header">
          <h2>Eval Score History</h2>
          <span class="count" id="eval-count">0 runs</span>
        </div>
        <div class="chart-container">
          <canvas id="eval-chart"></canvas>
        </div>
      </div>
    </div>

    <div>
      <!-- Distribution -->
      <div class="panel">
        <div class="panel-header"><h2>Classifications</h2></div>
        <div style="padding:1rem 1.25rem;" id="classification-dist"></div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>Actions Taken</h2></div>
        <div style="padding:1rem 1.25rem;" id="action-dist"></div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>Quick Actions</h2></div>
        <div style="padding:1rem 1.25rem;">
          <button onclick="runEval()" style="width:100%;padding:0.6rem;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:500;">Run Evaluation Suite</button>
          <div id="eval-result" style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted);"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
const API = "";

async function api(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status + " " + (await r.text()).slice(0, 80));
  return r.json();
}

function tag(text, cls) {
  return `<span class="label-tag ${cls}">${text}</span>`;
}

function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

// ── Stats Cards ─────────────────────────────────────────────────

async function loadStats() {
  try {
    const s = await api("/api/stats");
    document.getElementById("stat-issues").textContent = s.total_issues ?? 0;
    document.getElementById("stat-decisions").textContent = s.total_decisions ?? 0;
    document.getElementById("stat-prs").textContent = s.prs_opened ?? 0;
    const evalEl = document.getElementById("stat-eval");
    if (s.latest_eval_score != null) {
      evalEl.textContent = (s.latest_eval_score * 100).toFixed(0) + "%";
    } else {
      evalEl.textContent = "—";
    }
    drawDistributions(s);
  } catch (e) {
    document.querySelectorAll(".card .value").forEach(el => el.textContent = "err");
  }
}

function drawDistributions(s) {
  // Classification
  const cls = s.classification_distribution || {};
  const clsMax = Math.max(...Object.values(cls), 1);
  const clsColors = { bug: "#ef4444", feature: "#3b82f6", duplicate: "#a855f7", unclear: "#eab308" };
  let clsHtml = "";
  for (const [k, v] of Object.entries(cls).sort((a, b) => b[1] - a[1])) {
    const pct = (v / clsMax * 100).toFixed(0);
    clsHtml += `<div class="dist-bar"><span class="dist-label">${k}</span><div class="dist-track"><div class="dist-fill" style="width:${pct}%;background:${clsColors[k]||'#6366f1'}"></div></div><span class="dist-count">${v}</span></div>`;
  }
  document.getElementById("classification-dist").innerHTML = clsHtml || '<div class="empty"><p>No data</p></div>';

  // Actions
  const act = s.action_distribution || {};
  const actMax = Math.max(...Object.values(act), 1);
  const actColors = { opened_pr: "#22c55e", commented: "#6366f1", labeled: "#3b82f6", no_action: "#8b8fa5" };
  let actHtml = "";
  for (const [k, v] of Object.entries(act).sort((a, b) => b[1] - a[1])) {
    const pct = (v / actMax * 100).toFixed(0);
    actHtml += `<div class="dist-bar"><span class="dist-label">${k.replace("_", " ")}</span><div class="dist-track"><div class="dist-fill" style="width:${pct}%;background:${actColors[k]||'#6366f1'}"></div></div><span class="dist-count">${v}</span></div>`;
  }
  document.getElementById("action-dist").innerHTML = actHtml || '<div class="empty"><p>No data</p></div>';
}

// ── Issues Table ─────────────────────────────────────────────────

async function loadIssues() {
  try {
    const data = await api("/api/issues?per_page=15");
    document.getElementById("issues-count").textContent = data.total;
    const items = data.items || [];
    if (items.length === 0) {
      document.getElementById("issues-table").innerHTML = '<div class="empty"><p>No issues processed yet</p><div class="hint">Send a webhook or seed some data to get started</div></div>';
      return;
    }
    let html = `<table><thead><tr><th>Issue</th><th>Classification</th><th>Action</th><th>PR</th><th>Time</th></tr></thead><tbody>`;
    for (const iss of items) {
      const cls = iss.classification || "—";
      const act = iss.action_taken || "—";
      const clsTag = tag(cls, cls === "opened_pr" ? "bug" : cls);
      const actTag = tag(act.replace("_", " "), act);
      const prLink = iss.pr_url ? `<a href="${iss.pr_url}" target="_blank">#${iss.pr_url.split("/").pop()}</a>` : "—";
      html += `<tr>
        <td><a href="${iss.url || "#"}" target="_blank" title="${escHtml(iss.body || "").slice(0, 120)}">${escHtml(iss.title).slice(0, 60)}</a><br><span style="font-size:0.75rem;color:var(--text-muted)">#${iss.number} · ${iss.repo}</span></td>
        <td>${clsTag}</td>
        <td>${actTag}</td>
        <td>${prLink}</td>
        <td style="font-size:0.8rem;color:var(--text-muted)">${fmtDate(iss.decision_created_at || iss.created_at)}</td>
      </tr>`;
    }
    html += "</tbody></table>";
    document.getElementById("issues-table").innerHTML = html;
  } catch (e) {
    document.getElementById("issues-table").innerHTML = `<div class="empty"><p>Failed to load issues</p><div class="hint">${e.message}</div></div>`;
  }
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ── Eval Chart ──────────────────────────────────────────────────

let evalChart = null;

async function loadEvalRuns() {
  try {
    const runs = await api("/api/eval/runs?limit=30");
    document.getElementById("eval-count").textContent = runs.length + " runs";
    const labels = runs.map(r => fmtDate(r.created_at)).reverse();
    const scores = runs.map(r => r.overall_score != null ? r.overall_score * 100 : null).reverse();

    if (runs.length === 0) {
      document.querySelector(".chart-container").innerHTML = '<div class="empty"><p>No eval runs yet</p></div>';
      return;
    }

    const ctx = document.getElementById("eval-chart").getContext("2d");
    if (evalChart) evalChart.destroy();

    evalChart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Overall Score",
          data: scores,
          borderColor: "#6366f1",
          backgroundColor: "rgba(99,102,241,0.1)",
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: "#6366f1",
          pointBorderColor: "#1a1d27",
          pointBorderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#232738",
            titleColor: "#e1e5ee",
            bodyColor: "#8b8fa5",
            borderColor: "#2a2e3f",
            borderWidth: 1,
            cornerRadius: 6,
            callbacks: {
              label: ctx => ctx.parsed.y != null ? ctx.parsed.y.toFixed(1) + "%" : "",
            },
          },
        },
        scales: {
          x: {
            ticks: { color: "#8b8fa5", maxTicksLimit: 8, font: { size: 10 } },
            grid: { color: "rgba(42,46,63,0.5)" },
          },
          y: {
            min: 0,
            max: 100,
            ticks: { color: "#8b8fa5", callback: v => v + "%", font: { size: 10 } },
            grid: { color: "rgba(42,46,63,0.5)" },
          },
        },
      },
    });
  } catch (e) {
    document.querySelector(".chart-container").innerHTML = `<div class="empty"><p>Failed to load eval data</p></div>`;
  }
}

// ── Quick Actions ───────────────────────────────────────────────

async function runEval() {
  const btn = document.querySelector("button");
  const result = document.getElementById("eval-result");
  btn.disabled = true;
  btn.textContent = "Running...";
  result.textContent = "";
  try {
    const r = await fetch("/api/eval/run", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
    const data = await r.json();
    result.innerHTML = `Score: <strong>${(data.overall_score * 100).toFixed(1)}%</strong> · ${data.total_cases} cases · ${data.failures} failures`;
    loadEvalRuns();
    loadStats();
  } catch (e) {
    result.textContent = "Error: " + e.message;
  }
  btn.disabled = false;
  btn.textContent = "Run Evaluation Suite";
}

// ── Header Status ───────────────────────────────────────────────

async function loadHealth() {
  try {
    const h = await api("/health");
    document.getElementById("header-status").textContent = "v" + h.version + " · live";
    document.getElementById("header-status").style.color = "var(--green)";
  } catch (e) {
    document.getElementById("header-status").textContent = "offline";
    document.getElementById("header-status").style.color = "var(--red)";
  }
}

// ── Init ────────────────────────────────────────────────────────

async function init() {
  await loadHealth();
  await Promise.all([loadStats(), loadIssues(), loadEvalRuns()]);
}
init();

// Auto-refresh every 30s
setInterval(() => { loadStats(); loadIssues(); }, 30000);
</script>
</body>
</html>
